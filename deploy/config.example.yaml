# traffic-go example configuration
#
# Security warning:
# This service exposes sensitive network metadata. Keep it bound to 127.0.0.1
# unless you place it behind SSH port forwarding or an authenticated reverse
# proxy.

# Change the port here if the default local listen address conflicts with another service.
listen: "127.0.0.1:18080"
# install-centos7.sh rewrites this to <script-dir>/traffic.db during install.
db_path: ./traffic.db
tick_interval: 2s
# Controls how often the collector rebuilds the /proc socket index used for
# PID attribution. Keep this independent from tick_interval to avoid scanning
# every PID/net namespace on each conntrack sample.
socket_index_interval: 10s

# Network interfaces included in Dashboard NIC RX/TX totals. To align with a
# provider bandwidth graph, list only the public interface names shown by
# `ip link` or `ifconfig`. Leave unset only when you intentionally want the
# legacy behavior of collecting every up, non-loopback interface.
network_interfaces:
  - eth0

# Optional HTTP Basic Auth for the bundled WebUI and API. Required if listen
# is changed to a non-loopback address such as 0.0.0.0:18080.
# auth:
#   username: traffic
#   password: change-me

# Process-specific log directories for usage/explain log correlation.
# Keys are process names (comm/exe basename, case-insensitive).
# No built-in defaults: only configured process keys are searched.
# Values support both directory paths and glob file patterns.
# For shadowsocks-libev + simple-obfs on CentOS7, a practical setup is:
#   /var/log/shadowsocks/server.log
#   /var/log/shadowsocks/manager.log
#   /var/log/shadowsocks/obfs.log
process_log_dirs:
  nginx: /var/log/nginx
  ss-server: /var/log/shadowsocks
  ss-manager: /var/log/shadowsocks
  obfs-server: /var/log/shadowsocks
  frps: /root/frp_0630/*.log
  # rustdesk: /var/log/rustdesk

# Disabled by default because most installs should read Shadowsocks evidence
# from files under /var/log/shadowsocks. Set true only on hosts where
# Shadowsocks still logs exclusively to systemd journal.
shadowsocks_journal_fallback: false

retention:
  months: 3
  # Full detail is retained by UTC calendar month: current month plus the
  # previous two months. Expired months are summarized before detail cleanup.

prefetch:
  enabled: true
  interval: 1m
  evidence_lookback: 20m
  chain_lookback: 20m
  scan_budget: 8s
  max_scan_files: 6
  max_scan_lines_per_file: 250000
# Hourly cleanup and weekly vacuum are built in and are not configurable here.
